server {
    listen 80;
    server_name roove.team www.roove.team;

    # Redirect /soctrack to /soctrack/ (trailing slash)
    location = /soctrack {
        return 301 /soctrack/;
    }

    # Proxy /soctrack/ to the FastAPI app, stripping the prefix
    location /soctrack/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Root redirect to /soctrack/
    location = / {
        return 301 /soctrack/;
    }
}
